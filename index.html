<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum's Echo | Founder's Command</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --secondary: #0f172a; --accent: #f59e0b; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: var(--secondary); color: white; padding: 30px 20px; display: flex; flex-direction: column; }
        .logo { font-size: 22px; font-weight: 800; color: var(--primary); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 14px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #94a3b8; transition: 0.3s; margin-bottom: 5px; }
        .nav-item:hover, .nav-item.active { background: rgba(37, 99, 235, 0.1); color: white; }
        .viewport { flex: 1; overflow-y: auto; padding: 40px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .admin-box { background: #f1f5f9; padding: 20px; border-radius: 15px; border: 2px dashed var(--primary); margin-top: 10px; margin-bottom: 20px; }
        .btn-elite { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-elite:hover { opacity: 0.9; transform: scale(1.02); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .overlay { position: fixed; inset: 0; background: var(--secondary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="login-screen" class="overlay">
    <div class="card" style="width: 380px; text-align: center;">
        <h1 style="color: var(--primary)">Quantum's Echo</h1>
        <div id="g_id_onload" data-client_id="1020193667157-8apckjitkn3orps7h02mo9ru0seabm1c.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>
</div>

<nav class="sidebar">
    <div class="logo"><i class="fas fa-crown"></i> QE ACADEMY</div>
    <div class="nav-item active" onclick="showPage('dash')"><i class="fas fa-home"></i> Dashboard</div>
    <div class="nav-item" onclick="showPage('classes')"><i class="fas fa-video"></i> Your Classes</div>
    <div class="nav-item" onclick="showPage('toppers')"><i class="fas fa-trophy"></i> Hall of Toppers</div>
    <div id="admin-btn" class="nav-item" style="display:none; color: var(--accent)" onclick="showPage('admin')">
        <i class="fas fa-terminal"></i> Founders Command Panel
    </div>
    <div class="nav-item" style="margin-top:auto" onclick="location.reload()"><i class="fas fa-power-off"></i> Logout</div>
</nav>

<main class="viewport">
    <div id="dash" class="page active">
        <div class="card" style="background: linear-gradient(135deg, #1e293b, #334155); color: white;">
            <h1 id="welcome-header">Welcome, Cadet</h1>
            <p id="rank-display">Rank: Initializing...</p>
        </div>
    </div>

    <div id="classes" class="page">
        <h1>Your Enrolled Classes</h1>
        <div id="class-list" class="card">No live classes scheduled.</div>
    </div>

    <div id="toppers" class="page">
        <h1>Hall of Toppers</h1>
        <div class="card">
            <p>Filter by Grade:</p>
            <button class="btn-elite" onclick="filterToppers('1')">Grade 1</button>
            <button class="btn-elite" onclick="filterToppers('7')">Grade 7</button>
            <div id="toppers-list" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="admin" class="page">
        <h1>Founders Command Panel</h1>
        
        <div class="admin-box">
            <h3>Post Class Hyperlinks</h3>
            <select id="adm-grade"><option value="1">Grade 1</option><option value="7">Grade 7</option></select>
            <input type="url" id="adm-meet" placeholder="Paste Meeting Link (Google Meet/Zoom)">
            <button class="btn-elite" onclick="updateClass()">Broadcast Class</button>
        </div>

        <div class="admin-box">
            <h3>Add Result to Hall of Toppers</h3>
            <input type="text" id="top-name" placeholder="Student Name">
            <select id="top-grade"><option value="1">Grade 1</option><option value="7">Grade 7</option></select>
            <input type="url" id="top-link" placeholder="Paste Result/Certificate Link">
            <button class="btn-elite" onclick="addToppers()">Add Topper & Result</button>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCl1VyQZT5GJ0zSd3YVHFSybukKvY7Li78",
        authDomain: "sanat-teaching-system.firebaseapp.com",
        projectId: "sanat-teaching-system",
        storageBucket: "sanat-teaching-system.firebasestorage.app",
        messagingSenderId: "185568742186",
        appId: "1:185568742186:web:f858b9d4814f3304c1ac53"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let userEmail = "";

    window.handleCredentialResponse = async (response) => {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        userEmail = payload.email;
        document.getElementById('login-screen').style.display = 'none';
        
        const userRef = doc(db, "students", userEmail);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) {
            await setDoc(userRef, { email: userEmail, rank: "Cadet", grade: "1" });
        }
        loadProfile();
    };

    function loadProfile() {
        onSnapshot(doc(db, "students", userEmail), (doc) => {
            const data = doc.data();
            document.getElementById('welcome-header').innerText = userEmail === "tsanat669@gmail.com" ? "Welcome, Founder Sanat" : "Welcome, Student";
            document.getElementById('rank-display').innerText = "Rank: " + (data.rank || "Cadet");
            if(userEmail === "tsanat669@gmail.com") document.getElementById('admin-btn').style.display = 'flex';
            loadClasses(data.grade || "1");
        });
    }

    // BROADCAST CLASS LINK
    window.updateClass = async () => {
        const grade = document.getElementById('adm-grade').value;
        const link = document.getElementById('adm-meet').value;
        await setDoc(doc(db, "classes", "grade-" + grade), { url: link });
        alert("Class Link Posted!");
    };

    function loadClasses(grade) {
        onSnapshot(doc(db, "classes", "grade-" + grade), (d) => {
            if(d.exists()) {
                document.getElementById('class-list').innerHTML = `
                    <p>Live Class Link is Active:</p>
                    <a href="${d.data().url}" target="_blank" class="btn-elite" style="text-decoration:none">Join Live Class</a>`;
            }
        });
    }

    // ADD TOPPER WITH RESULT LINK
    window.addToppers = async () => {
        const name = document.getElementById('top-name').value;
        const grade = document.getElementById('top-grade').value;
        const link = document.getElementById('top-link').value;
        await addDoc(collection(db, "toppers"), { name, grade, resultUrl: link });
        alert("Topper Added!");
    };

    window.filterToppers = (grade) => {
        const q = query(collection(db, "toppers"), where("grade", "==", grade));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('toppers-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <strong>${data.name}</strong>
                        <a href="${data.resultUrl}" target="_blank" class="btn-elite" style="text-decoration:none; font-size:12px;">View Result</a>
                    </div>`;
            });
        });
    };

    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };
</script>
</body>
</html>
