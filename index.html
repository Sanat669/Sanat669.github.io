<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum's Echo Academy</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCl1VyQZT5GJ0zSd3YVHFSybukKvY7Li78",
            authDomain: "sanat-teaching-system.firebaseapp.com",
            projectId: "sanat-teaching-system",
            storageBucket: "sanat-teaching-system.firebasestorage.app",
            messagingSenderId: "185568742186",
            appId: "1:185568742186:web:f858b9d4814f3304c1ac53",
            measurementId: "G-XQR52M2KX9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Listen for live Class Link updates
        onSnapshot(doc(db, "settings", "classConfig"), (doc) => {
            if (doc.exists()) {
                const link = doc.data().gmeet;
                const btn = document.getElementById('join-btn');
                btn.onclick = () => window.open(link, '_blank');
                btn.style.display = 'inline-block';
            }
        });

        window.handleCredentialResponse = async (response) => {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            document.getElementById('user-name').innerText = payload.name;
            
            const userRef = doc(db, "students", payload.email);
            const userSnap = await getDoc(userRef);
            
            let studentId;
            if (userSnap.exists()) {
                studentId = userSnap.data().studentId;
            } else {
                studentId = Math.random().toString(36).slice(2, 8).toUpperCase();
                await setDoc(userRef, { name: payload.name, studentId: studentId });
            }

            document.getElementById('student-id').innerText = studentId;
            document.getElementById('portal-content').style.display = 'block';
            if (payload.email === "tsanat669@gmail.com") {
                document.getElementById('admin-section').style.display = 'block';
            }
        };

        window.updateClass = async () => {
            const newLink = document.getElementById('gmeet-input').value;
            if(newLink) {
                await setDoc(doc(db, "settings", "classConfig"), { gmeet: newLink });
                alert("Class link broadcasted to all students!");
            }
        };
    </script>
    <style>
        :root { --primary: #1a2a6c; --accent: #f2a900; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; text-align: center; }
        header { background: linear-gradient(to right, #1a2a6c, #b21f1f, #fdbb2d); color: white; padding: 3rem 1rem; }
        .container { padding: 2rem; max-width: 800px; margin: auto; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #portal-content, #admin-section { display: none; }
        input { padding: 10px; width: 80%; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <header>
        <h1>Quantum's Echo Academy</h1>
        <p>Innovation in Education</p>
    </header>
    <div class="container">
        <div class="card">
            <h2>Student Portal</h2>
            <div id="g_id_onload" data-client_id="1020193667157-8apckjitkn3orps7h02mo9ru0seabm1c.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="standard"></div>
            <div id="portal-content">
                <h3>Welcome, <span id="user-name"></span></h3>
                <p>Your Permanent ID: <strong id="student-id" style="color: #b21f1f;"></strong></p>
                <button id="join-btn" class="btn" style="background: #28a745; display:none;">Join Live Class</button>
            </div>
        </div>
        <div id="admin-section" class="card">
            <h3>Principal's Dashboard</h3>
            <input type="text" id="gmeet-input" placeholder="Paste new GMeet link here">
            <button class="btn" onclick="updateClass()">Broadcast Link</button>
        </div>
    </div>
</body>
</html>
