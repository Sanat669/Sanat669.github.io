<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QE Academy | Founders Command Panel</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #b59410; --bg: #f1f5f9; --sidebar: #0f172a; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: #334155; }
        .sidebar { width: 280px; background: var(--sidebar); color: white; display: flex; flex-direction: column; padding: 20px; }
        .logo { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 40px; display: flex; align-items: center; gap: 12px; }
        .nav-item { padding: 15px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #94a3b8; transition: 0.3s; margin-bottom: 8px; }
        .nav-item:hover, .nav-item.active { background: rgba(181, 148, 16, 0.2); color: white; border-left: 4px solid var(--accent); }
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .btn-gold { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; }
        .welcome-banner { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; padding: 35px; border-radius: 20px; margin-bottom: 30px; border-bottom: 5px solid var(--accent); }
        .overlay { position: fixed; inset: 0; background: var(--sidebar); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="auth-screen" class="overlay">
    <div class="card" style="width: 400px; text-align: center;">
        <h1 style="color: var(--primary)">QE Academy</h1>
        <div id="g_id_onload" data-client_id="1020193667157-8apckjitkn3orps7h02mo9ru0seabm1c.apps.googleusercontent.com" data-callback="handleAuth"></div>
        <div class="g_id_signin" data-type="standard"></div>
        <div id="reg-form" style="display:none; margin-top:20px; text-align:left;">
            <h3>New Student Registration</h3>
            <input type="text" id="reg-school" placeholder="School Name">
            <select id="reg-grade"><option value="1">Grade 1</option><option value="7">Grade 7</option></select>
            <input type="text" id="reg-subjects" placeholder="Enrolled Subjects">
            <button class="btn-gold" onclick="finishReg()">Join Academy</button>
        </div>
    </div>
</div>

<nav class="sidebar">
    <div class="logo"><i class="fas fa-crown"></i> QE ACADEMY</div>
    <div class="nav-item active" onclick="showPage('dash')"><i class="fas fa-home"></i> Dashboard</div>
    <div id="admin-link" class="nav-item" style="display:none; color: var(--accent)" onclick="showPage('admin')"><i class="fas fa-terminal"></i> Founders Command</div>
    <div class="nav-item" onclick="showPage('arena')"><i class="fas fa-gamepad"></i> Practice Arena</div>
    <div class="nav-item" onclick="location.reload()"><i class="fas fa-power-off"></i> Logout</div>
</nav>

<main class="main-content">
    <div id="dash" class="page active">
        <div class="welcome-banner"><h1 id="welcome-text">Loading...</h1><p id="rank-text">Rank: Cadet</p></div>
        <div class="card"><h3>Founder Contact</h3><textarea id="msg-input"></textarea><button class="btn-gold" onclick="sendMsg()">Send</button></div>
    </div>

    <div id="admin" class="page">
        <h1>Founders Command Panel</h1>
        <div class="card"><h3>Incoming Messages</h3><div id="inbox"></div></div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCl1VyQZT5GJ0zSd3YVHFSybukKvY7Li78",
        authDomain: "sanat-teaching-system.firebaseapp.com",
        projectId: "sanat-teaching-system",
        storageBucket: "sanat-teaching-system.firebasestorage.app",
        messagingSenderId: "185568742186",
        appId: "1:185568742186:web:f858b9d4814f3304c1ac53"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let user = null;

    window.handleAuth = async (res) => {
        const payload = JSON.parse(atob(res.credential.split('.')[1]));
        const email = payload.email;
        const snap = await getDoc(doc(db, "students", email));
        
        if (!snap.exists()) {
            user = { email };
            document.getElementById('reg-form').style.display = 'block';
        } else {
            user = snap.data();
            finish();
        }
    };

    window.finishReg = async () => {
        user.school = document.getElementById('reg-school').value;
        user.grade = document.getElementById('reg-grade').value;
        user.rank = "Cadet";
        await setDoc(doc(db, "students", user.email), user);
        finish();
    };

    function finish() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('welcome-text').innerText = user.email === "tsanat669@gmail.com" ? "Welcome, Founder Sanat" : "Welcome, Student";
        if(user.email === "tsanat669@gmail.com") {
            document.getElementById('admin-link').style.display = 'flex';
            onSnapshot(query(collection(db, "messages"), orderBy("time", "desc")), (s) => {
                const box = document.getElementById('inbox');
                box.innerHTML = "";
                s.forEach(d => box.innerHTML += `<div class="card"><b>${d.data().from}:</b> ${d.data().msg}</div>`);
            });
        }
    }

    window.sendMsg = async () => {
        const msg = document.getElementById('msg-input').value;
        await addDoc(collection(db, "messages"), { from: user.email, msg, time: Date.now() });
        alert("Sent!");
    };

    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };
</script>
</body>
</html>
